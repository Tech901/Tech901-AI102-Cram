<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Practice Exam | AI-102</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #232733; --border: #2e3345;
    --text: #e4e6ef; --text-dim: #8b8fa3;
    --amber: #f5a623; --amber-dim: rgba(245,166,35,0.25);
    --green: #34d399; --green-dim: rgba(52,211,153,0.25);
    --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.25);
    --red: #f87171; --red-dim: rgba(248,113,113,0.25);
    --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.25);
    --cyan: #22d3ee; --cyan-dim: rgba(34,211,238,0.25);
    --accent: var(--amber); --accent-dim: var(--amber-dim);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem; max-width: 900px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 2px solid var(--accent); }
  .header h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.3rem; }
  .header .subtitle { color: var(--text-dim); font-size: 0.95rem; }
  .badge { display: inline-block; padding: 0.2rem 0.7rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge-amber { background: var(--amber-dim); color: var(--amber); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-purple { background: var(--purple-dim); color: var(--purple); }
  .badge-cyan { background: var(--cyan-dim); color: var(--cyan); }
  code { background: var(--surface2); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.8rem; color: var(--cyan); }
  pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; overflow-x: auto; font-size: 0.8rem; line-height: 1.5; margin: 0.75rem 0; }
  pre code { background: none; padding: 0; }

  /* Controls Bar */
  .controls { position: sticky; top: 0; z-index: 100; background: rgba(26,29,39,0.95); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1.25rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .progress-wrap { flex: 1; min-width: 120px; }
  .progress-bar { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; width: 0%; }
  .progress-text { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }
  .score-display { font-size: 0.9rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .timer { font-family: 'Consolas', 'Courier New', monospace; font-size: 1rem; color: var(--accent); white-space: nowrap; }
  .timer.warning { color: var(--red); }

  /* Buttons */
  .btn { padding: 0.4rem 1rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.75rem; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .option-row:focus-visible { outline: 2px solid var(--accent); outline-offset: -1px; }
  .order-select:focus-visible, .match-select:focus-visible, .code-fill-select:focus-visible { outline: 2px solid var(--accent); }
  .hotarea-line:focus-visible { outline: 2px solid var(--accent); outline-offset: -1px; }
  .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  /* Question Cards */
  .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; transition: border-color 0.2s; }
  .question-card.has-answer { border-top: 2px solid var(--accent); }
  .question-card.correct { border-left: 3px solid var(--green); }
  .question-card.incorrect { border-left: 3px solid var(--red); }
  .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .q-meta { display: flex; gap: 0.5rem; align-items: center; }
  .q-num { font-size: 0.75rem; color: var(--text-dim); }
  .q-text { font-size: 0.95rem; margin-bottom: 1rem; line-height: 1.6; }
  .q-instruction { font-size: 0.8rem; color: var(--accent); margin-bottom: 0.75rem; font-style: italic; }

  /* Scenario Box */
  .scenario-box { background: var(--surface2); border-left: 3px solid var(--accent); padding: 1rem; margin-bottom: 1rem; border-radius: 0 8px 8px 0; font-size: 0.85rem; line-height: 1.6; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.75rem; }
  .option-row { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 8px; cursor: pointer; transition: background 0.15s; border: 1px solid transparent; user-select: none; min-height: 40px; }
  .option-row:hover { background: var(--surface2); }
  .option-row.selected { background: var(--accent-dim); border-color: var(--accent); }
  .option-row.correct-answer { background: var(--green-dim); border-color: var(--green); }
  .option-row.wrong-answer { background: var(--red-dim); border-color: var(--red); }
  .option-row.disabled { pointer-events: none; opacity: 0.8; }
  .option-key { font-weight: 700; color: var(--accent); min-width: 20px; }
  .option-text { font-size: 0.85rem; }
  .option-indicator { margin-left: auto; font-size: 0.85rem; }

  /* Order Items */
  .order-items { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.75rem; }
  .order-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 1rem; background: var(--surface2); border-radius: 8px; border: 1px solid transparent; min-height: 40px; }
  .order-item.correct-pos { border-color: var(--green); background: var(--green-dim); }
  .order-item.wrong-pos { border-color: var(--red); background: var(--red-dim); }
  .order-select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.5rem; font-size: 0.8rem; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
  .order-text { font-size: 0.85rem; }

  /* Match type */
  .match-container { display: flex; gap: 1.5rem; margin-bottom: 0.75rem; }
  .match-col { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
  .match-col-header { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; font-weight: 600; margin-bottom: 0.25rem; }
  .match-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; background: var(--surface2); border-radius: 8px; font-size: 0.85rem; border: 1px solid transparent; min-height: 40px; }
  .match-item.correct-match { border-color: var(--green); background: var(--green-dim); }
  .match-item.wrong-match { border-color: var(--red); background: var(--red-dim); }
  .match-select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.5rem; font-size: 0.8rem; min-width: 40px; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
  .match-num { font-weight: 700; color: var(--accent); min-width: 20px; }

  /* Code-fill type */
  .code-fill-pre { position: relative; overflow: visible; }
  .code-fill-select { font-family: 'Consolas', 'Courier New', monospace; background: var(--surface); color: var(--cyan); border: 1px solid var(--accent); border-radius: 4px; padding: 0.2rem 0.4rem; font-size: 0.8rem; z-index: 10; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
  .code-fill-select.correct-blank { border-color: var(--green); background: var(--green-dim); }
  .code-fill-select.wrong-blank { border-color: var(--red); background: var(--red-dim); }

  /* Hotarea type */
  .hotarea-lines { font-family: 'Consolas', 'Courier New', monospace; font-size: 0.8rem; margin-bottom: 0.75rem; }
  .hotarea-line { display: flex; align-items: center; gap: 0.75rem; padding: 0.4rem 0.75rem; cursor: pointer; border-radius: 6px; border: 1px solid transparent; transition: all 0.15s; user-select: none; min-height: 40px; }
  .hotarea-line:hover { background: var(--surface2); }
  .hotarea-line.selected { background: var(--accent-dim); border-color: var(--accent); }
  .hotarea-line.correct-line { background: var(--green-dim); border-color: var(--green); }
  .hotarea-line.wrong-line { background: var(--red-dim); border-color: var(--red); }
  .hotarea-line.missed-line { border: 1px dashed var(--green); }
  .hotarea-linenum { color: var(--text-dim); min-width: 24px; text-align: right; }
  .hotarea-code { white-space: pre; }

  /* Case study type */
  .casestudy-scenario { background: var(--surface2); border-left: 3px solid var(--accent); padding: 1rem; margin-bottom: 1rem; border-radius: 0 8px 8px 0; font-size: 0.85rem; line-height: 1.6; max-height: 250px; overflow-y: auto; }
  .casestudy-subq { padding: 0.75rem 0; border-top: 1px solid var(--border); }
  .casestudy-subq:first-child { border-top: none; }
  .casestudy-subq-label { font-size: 0.75rem; color: var(--accent); margin-bottom: 0.5rem; }

  /* Feedback */
  .feedback { border-radius: 8px; padding: 0.75rem 1rem; margin-top: 0.75rem; font-size: 0.85rem; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: var(--green-dim); border: 1px solid rgba(52,211,153,0.3); }
  .feedback.incorrect { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.3); }
  .feedback strong { display: block; margin-bottom: 0.3rem; }
  .feedback .cram-link { margin-top: 0.5rem; }
  .feedback .cram-link a { color: var(--blue); text-decoration: none; font-size: 0.8rem; }
  .feedback .cram-link a:hover { text-decoration: underline; }

  /* Summary */
  #summary { display: none; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; text-align: center; margin-bottom: 1.5rem; }
  .score-big { font-size: 3.5rem; font-weight: 800; line-height: 1; }
  .score-big.pass { color: var(--green); }
  .score-big.fail { color: var(--red); }
  .score-label { font-size: 1rem; color: var(--text-dim); margin-top: 0.25rem; }
  .pass-fail { font-size: 1.2rem; font-weight: 700; margin-top: 0.5rem; }
  .pass-fail.pass { color: var(--green); }
  .pass-fail.fail { color: var(--red); }
  .breakdown { text-align: left; margin-top: 1.5rem; }
  .breakdown h3 { font-size: 0.95rem; color: var(--accent); margin-bottom: 0.75rem; }
  .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .breakdown-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; margin: 0 1rem; }
  .breakdown-bar-fill { height: 100%; border-radius: 3px; }
  .review-list { text-align: left; margin-top: 1.5rem; }
  .review-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0; font-size: 0.8rem; cursor: pointer; }
  .review-item:hover { color: var(--accent); }
  .review-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .review-dot.correct { background: var(--green); }
  .review-dot.incorrect { background: var(--red); }
  .review-dot.unanswered { background: var(--text-dim); }

  /* Nav Links */
  .nav-links { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .nav-links a { color: var(--blue); text-decoration: none; font-size: 0.8rem; padding: 0.3rem 0.8rem; border: 1px solid var(--blue); border-radius: 6px; }
  .nav-links a:hover { background: var(--blue-dim); }

  @media (max-width: 640px) {
    body { padding: 1rem; }
    .header h1 { font-size: 1.5rem; }
    .controls { flex-direction: column; gap: 0.5rem; padding: 0.5rem 0.75rem; }
    .match-container { flex-direction: column; gap: 0.75rem; }
    .btn-group { width: 100%; justify-content: center; }
    .q-text { font-size: 0.9rem; }
    .option-row { padding: 0.75rem 1rem; }
    .hotarea-line { padding: 0.6rem 0.75rem; }
    .score-display, .timer { font-size: 0.8rem; }
    pre { font-size: 0.7rem; }
  }

  @media print {
    body { background: #fff; color: #000; padding: 1rem; }
    .controls, .btn, .timer { display: none !important; }
    .question-card { border: 1px solid #ccc; break-inside: avoid; }
    .feedback { display: block !important; background: #f0f0f0; border: 1px solid #ccc; }
    .option-row.correct-answer { border: 2px solid #000; }
    .header h1 { color: #333; }
  }
</style>
</head>

<script>
// ========== ALL 138 QUESTIONS (D1: 30, D2: 25, D3: 13, D4: 20, D5: 25, D6: 25) ==========
const ALL_QUESTIONS = [
// ── SINGLE-CHOICE (9) ──────────────────────────────────────────────
{id:"d1-001", type:"single", domain:"D1", topic:"Multi-Service vs Single-Service Resources",
 question:"The Memphis Zoo is building an animal monitoring system that uses Language, Vision, and Speech services. A developer proposes creating separate single-service resources for each. What is the PRIMARY advantage of using a single multi-service Foundry resource instead?",
 options:[
  {key:"A",text:"Multi-service resources offer higher API rate limits per service"},
  {key:"B",text:"A single endpoint and key simplifies management and billing across services"},
  {key:"C",text:"Multi-service resources automatically enable private endpoints"},
  {key:"D",text:"Single-service resources cannot be deployed in the same region"}
 ],
 answer:"B",
 explanation:"A multi-service (Foundry) resource provides one endpoint and one key that works across multiple AI services, simplifying credential management and consolidating billing. Rate limits are per-service regardless of resource type. Private endpoints and regional deployment are available for both resource types.",
 cramRef:"../00-exam-overview.html"},

{id:"d1-002", type:"single", domain:"D1", topic:"Content Safety Severity Levels",
 question:"Shelby County Schools is implementing Azure AI Content Safety to filter student-generated content. The API returns a severity score of 4 for a piece of text in the Violence category. What does this severity level indicate?",
 options:[
  {key:"A",text:"Safe - content uses terms in professional contexts appropriate for most audiences"},
  {key:"B",text:"Low - content includes stereotyping or offensive language at low intensity"},
  {key:"C",text:"Medium - content includes depictions of seeking and executing harmful instructions at medium intensity"},
  {key:"D",text:"High - content displays explicit and severe harmful instructions or actions"}
 ],
 answer:"C",
 explanation:"Azure AI Content Safety uses severity levels 0 (Safe), 2 (Low), 4 (Medium), and 6 (High) in the trimmed scale. Severity level 4 corresponds to Medium, which describes content that uses offensive, insulting, or demeaning language, or depicts harmful instructions at medium intensity. The full 0-7 scale maps [4,5] to severity 4.",
 cramRef:"../05-responsible-ai.html"},

{id:"d1-003", type:"single", domain:"D1", topic:"Content Filter Default Thresholds",
 question:"A developer at FedEx logistics deploys a GPT-4o model on Azure OpenAI without configuring any custom content filters. A user submits a prompt that is classified as 'low' severity for the Hate category. What happens?",
 options:[
  {key:"A",text:"The prompt is blocked because the default threshold filters all non-safe content"},
  {key:"B",text:"The prompt is allowed through because the default threshold is set to medium"},
  {key:"C",text:"The prompt is blocked because Hate has a stricter default threshold than other categories"},
  {key:"D",text:"The prompt is allowed through because content filtering is disabled by default"}
 ],
 answer:"B",
 explanation:"The default content filtering configuration for Azure OpenAI text models filters at the medium severity threshold for all four harm categories (Hate, Violence, Sexual, Self-Harm) on both prompts and completions. Content at low or safe severity passes through; only medium and high severity content is filtered by default.",
 cramRef:"../05-responsible-ai.html"},

{id:"d1-004", type:"single", domain:"D1", topic:"Responsible AI Principles",
 question:"St. Jude Children's Research Hospital is deploying an AI system to help prioritize patient imaging reviews. During testing, the team discovers the model performs significantly better for one demographic group than another. Which Microsoft Responsible AI principle is MOST directly violated?",
 options:[
  {key:"A",text:"Transparency"},
  {key:"B",text:"Accountability"},
  {key:"C",text:"Fairness"},
  {key:"D",text:"Privacy and Security"}
 ],
 answer:"C",
 explanation:"Microsoft's six Responsible AI principles are: Fairness, Reliability and Safety, Privacy and Security, Inclusiveness, Transparency, and Accountability. When an AI system performs differently across demographic groups, this most directly violates the Fairness principle, which states AI systems should treat everyone fairly and avoid affecting similarly situated groups differently.",
 cramRef:"../05-responsible-ai.html"},

{id:"d1-005", type:"single", domain:"D1", topic:"RBAC Roles for Azure OpenAI",
 question:"A Beale Street Entertainment District developer needs to make inference API calls to an Azure OpenAI resource using Microsoft Entra ID authentication. They do NOT need to create deployments or manage keys. Which is the LEAST privileged role that meets these requirements?",
 options:[
  {key:"A",text:"Cognitive Services Contributor"},
  {key:"B",text:"Cognitive Services OpenAI Contributor"},
  {key:"C",text:"Cognitive Services OpenAI User"},
  {key:"D",text:"Cognitive Services Usages Reader"}
 ],
 answer:"C",
 explanation:"Cognitive Services OpenAI User is the least privileged role that allows making inference API calls with Microsoft Entra ID. It can view the resource, view deployments, and use playground and API for inference. It cannot create deployments, manage keys, or upload fine-tuning data. Cognitive Services OpenAI Contributor adds deployment management. Cognitive Services Contributor adds resource creation and key access. Usages Reader only provides quota viewing.",
 cramRef:"../00-exam-overview.html"},

{id:"d1-006", type:"single", domain:"D1", topic:"Container Deployment",
 question:"The Memphis Grizzlies fan engagement platform team wants to deploy an Azure AI Services container for real-time sentiment analysis in an air-gapped environment. Which statement about Azure AI containers is correct?",
 options:[
  {key:"A",text:"Containers can run indefinitely without any connection to Azure"},
  {key:"B",text:"Containers must connect to Azure periodically for billing, or they stop serving requests"},
  {key:"C",text:"Containers require a GPU on the host machine to function"},
  {key:"D",text:"Containers include their own built-in billing system that works offline"}
 ],
 answer:"B",
 explanation:"Azure AI Services containers must connect to the billing endpoint periodically. The container reports usage every 10-15 minutes. If it cannot connect within the allowed time window (approximately 10 attempts at 10-15 minute intervals), it stops serving requests. Containers are CPU-based (x64 Linux) and do not require GPUs. Disconnected containers are available for specific scenarios with a separate commitment plan.",
 cramRef:"../00-exam-overview.html"},

{id:"d1-007", type:"single", domain:"D1", topic:"Diagnostic Logging",
 question:"A Shelby Farms Park wildlife monitoring system administrator wants to capture all API request and response data from their Azure AI Services resource. Where should they configure this?",
 options:[
  {key:"A",text:"In the resource's Diagnostic settings, sending to a Log Analytics workspace"},
  {key:"B",text:"In Azure Active Directory, under Application Registrations"},
  {key:"C",text:"In the resource's Networking tab, under Request Logging"},
  {key:"D",text:"In Azure Policy, by creating a custom logging policy"}
 ],
 answer:"A",
 explanation:"Azure AI Services diagnostic logging is configured through Diagnostic settings under the Monitoring section of the resource. You create a diagnostic setting that selects log categories (Audit, RequestResponse, AllMetrics) and a destination (Log Analytics workspace, Storage account, or Event Hub). Log Analytics is recommended because it allows running Kusto queries against the data.",
 cramRef:"../00-exam-overview.html"},

{id:"d1-008", type:"single", domain:"D1", topic:"Content Safety Categories",
 question:"FedEx logistics is using Azure AI Content Safety to moderate user-submitted package description text. The API returns scores for four categories. Which of the following is NOT one of the four default harm categories?",
 options:[
  {key:"A",text:"Hate and Fairness"},
  {key:"B",text:"Violence"},
  {key:"C",text:"Misinformation"},
  {key:"D",text:"Self-Harm"}
 ],
 answer:"C",
 explanation:"Azure AI Content Safety detects four default harm categories: Hate (and Fairness), Sexual, Violence, and Self-Harm. Misinformation is not one of the built-in categories. Users can define custom categories for additional moderation needs like brand protection or misinformation detection.",
 cramRef:"../05-responsible-ai.html"},

{id:"d1-009", type:"single", domain:"D1", topic:"Resource Monitoring",
 question:"A Memphis 311 administrator notices that API calls to their Azure AI Services resource are being throttled. Which Azure Monitor feature should they use FIRST to investigate the issue?",
 options:[
  {key:"A",text:"Activity Log to check for recent configuration changes"},
  {key:"B",text:"Metrics Explorer to view request counts and HTTP 429 responses"},
  {key:"C",text:"Log Analytics to run a Kusto query against resource logs"},
  {key:"D",text:"Azure Advisor to check for performance recommendations"}
 ],
 answer:"B",
 explanation:"HTTP 429 status codes indicate rate limiting (throttling). Metrics Explorer provides real-time views of platform metrics including request counts, error rates, and latency. It is the fastest way to confirm throttling and see usage patterns. While Log Analytics provides deeper analysis, Metrics Explorer gives the quickest initial view of the problem.",
 cramRef:"../00-exam-overview.html"},

// ── MULTI-SELECT (4) ───────────────────────────────────────────────
{id:"d1-010", type:"multi", domain:"D1", topic:"Responsible AI Principles", selectCount:2,
 question:"Memphis Zoo is publishing a transparency report for their AI-powered animal health monitoring system. According to Microsoft's six Responsible AI principles, which TWO of the following are actual principles? (Select 2)",
 options:[
  {key:"A",text:"Fairness"},
  {key:"B",text:"Profitability"},
  {key:"C",text:"Inclusiveness"},
  {key:"D",text:"Scalability"}
 ],
 answer:["A","C"],
 explanation:"Microsoft's six Responsible AI principles are: (1) Fairness, (2) Reliability and Safety, (3) Privacy and Security, (4) Inclusiveness, (5) Transparency, and (6) Accountability. Profitability and Scalability are not among the six principles.",
 cramRef:"../05-responsible-ai.html"},

{id:"d1-011", type:"multi", domain:"D1", topic:"RBAC Role Capabilities", selectCount:2,

{id:"d1-012", type:"multi", domain:"D1", topic:"Content Filter Configuration", selectCount:2,

{id:"d1-017", type:"scenario", domain:"D1", topic:"Resource Planning",
 scenario:"Shelby Farms Park is building a wildlife monitoring system that uses Azure AI Vision for camera trap image analysis, Azure AI Language for visitor feedback sentiment analysis, and Azure Speech for ranger voice commands. The team has a single Azure subscription and wants to minimize the number of resources and keys to manage. All services will be deployed to the East US region.",
 question:"What resource configuration should the team use?",
 options:[
  {key:"A",text:"Create one multi-service Foundry resource (kind: AIServices, SKU: S0) in East US"},
  {key:"B",text:"Create three separate single-service resources, one for each AI service"},
  {key:"C",text:"Create one Azure OpenAI resource, which includes all AI services"},
  {key:"D",text:"Create one Azure AI Search resource with integrated AI capabilities"}
 ],
 answer:"A",
 explanation:"A multi-service Foundry resource (kind: AIServices) provides access to Vision, Language, Speech, and other services through a single endpoint and key. This minimizes management overhead. Azure OpenAI is a separate specialized resource type and does not include Vision or Language. Azure AI Search is for search workloads, not general AI services.",
 cramRef:"../00-exam-overview.html"},

{id:"d1-018", type:"scenario", domain:"D1", topic:"Content Safety Implementation",
 scenario:"The Memphis Grizzlies fan engagement platform allows fans to post messages during live games. The moderation team wants to automatically flag content that contains hate speech or violent threats while allowing passionate sports commentary. They need to balance safety with user experience, avoiding over-blocking of legitimate sports discussion.",
 question:"What content filtering configuration should they implement?",
 options:[
  {key:"A",text:"Set all four Content Safety categories to severity threshold 0 to catch everything"},
  {key:"B",text:"Set Hate and Violence thresholds to severity 4 (medium) and Sexual and Self-Harm to severity 6 (high)"},
  {key:"C",text:"Disable content filtering entirely and rely on human moderators"},
  {key:"D",text:"Use only blocklist-based filtering with a list of banned words"}
 ],
 answer:"B",
 explanation:"Setting Hate and Violence to medium (4) catches genuinely harmful content while allowing passionate sports language that might score low severity. Setting Sexual and Self-Harm to high (6) is appropriate since these are less likely in sports chat and a higher threshold avoids false positives. Threshold 0 would over-block legitimate commentary. Disabling filters entirely creates unacceptable risk. Blocklists alone cannot assess context and severity.",
 cramRef:"../05-responsible-ai.html"},

{id:"d1-019", type:"scenario", domain:"D1", topic:"Security and Compliance",
 scenario:"St. Jude Children's Research Hospital must deploy an AI text analytics solution that processes patient feedback. Due to HIPAA compliance requirements, no patient data can leave the hospital's private network. The hospital has an on-premises Kubernetes cluster. They still need an Azure AI Services resource for billing purposes.",
 question:"What deployment approach should the hospital use?",
 options:[
  {key:"A",text:"Deploy Azure AI Services containers on the on-premises Kubernetes cluster with periodic billing connection to Azure"},
  {key:"B",text:"Use the Azure AI Services REST API with a VPN connection to Azure"},
  {key:"C",text:"Deploy the solution entirely in Azure with Private Link endpoints"},
  {key:"D",text:"Use Azure Arc to extend the Azure AI Services resource to on-premises"}
 ],
 answer:"A",
 explanation:"Azure AI Services containers allow processing data locally on the hospital's private network while only sending billing telemetry to Azure. Patient data stays on-premises within the HIPAA boundary. The container connects to the billing endpoint periodically but processes all inference locally. A VPN still sends data to Azure. Private Link keeps data in Azure (not on-premises). Azure Arc does not extend AI Services in this way.",
 cramRef:"../00-exam-overview.html"},

{id:"d1-025", type:"casestudy", domain:"D1", topic:"Enterprise AI Governance",
 scenario:"Memphis 311 is deploying a city-wide AI platform that includes: (1) A citizen complaint triage system using Azure OpenAI GPT-4o, (2) An image analysis system for code enforcement using Azure AI Vision, (3) A multilingual translation system for non-English-speaking residents using Azure Translator. The platform must meet the following requirements: - Three developer teams need access with different permission levels - All API usage must be logged for audit purposes - The platform must comply with the city's responsible AI policy - Cost tracking must be centralized across all services",
 question:"Answer the following questions about the Memphis 311 platform design:",
 subQuestions:[
  {id:"d1-025a", type:"single",
   question:"The lead architect team needs to create resources and manage API keys. The triage team needs to create and manage model deployments but not manage keys. The translation team only needs to make inference calls. What is the correct role assignment?",
   options:[
    {key:"A",text:"Architects: Owner; Triage: Contributor; Translation: Reader"},
    {key:"B",text:"Architects: Cognitive Services Contributor; Triage: Cognitive Services OpenAI Contributor; Translation: Cognitive Services OpenAI User"},
    {key:"C",text:"Architects: Cognitive Services OpenAI Contributor; Triage: Cognitive Services OpenAI User; Translation: Cognitive Services Usages Reader"},
    {key:"D",text:"All teams: Cognitive Services Contributor for simplicity"}
   ],
   answer:"B",
   explanation:"Cognitive Services Contributor allows creating resources and viewing/regenerating keys (for architects). Cognitive Services OpenAI Contributor allows creating/editing deployments and uploading fine-tuning data but not managing keys (for triage team). Cognitive Services OpenAI User allows only inference calls (for translation team). This follows the principle of least privilege."},
  {id:"d1-025b", type:"multi",
   question:"To meet the audit logging and cost tracking requirements, which TWO actions should the administrator take? (Select 2)",
   selectCount:2,
   options:[
    {key:"A",text:"Configure diagnostic settings on each AI resource to send logs to a shared Log Analytics workspace"},
    {key:"B",text:"Enable Azure Policy to automatically block all unlogged API calls"},
    {key:"C",text:"Use a single multi-service Foundry resource to centralize billing across Vision, Language, and Translator"},
    {key:"D",text:"Configure each team to use separate Azure subscriptions for cost isolation"}
   ],
   answer:["A","C"],
   explanation:"Diagnostic settings with a shared Log Analytics workspace centralizes audit logs across all AI resources. A multi-service Foundry resource consolidates billing for Vision, Language, and Translator under one resource. Azure Policy cannot block unlogged API calls in this way. Separate subscriptions would fragment rather than centralize cost tracking."}
 ],
 explanation:"This scenario tests understanding of RBAC role assignment following least privilege, diagnostic logging for audit compliance, and resource architecture decisions for cost management.",

{id:"d2-001", type:"single", domain:"D2", topic:"GPT-4o Model Capabilities",
 question:"The Memphis Zoo is deploying GPT-4o (2024-08-06) to analyze both text descriptions and camera trap images of animals. What is the maximum input context window for this model?",
 options:[
  {key:"A",text:"32,768 tokens"},
  {key:"B",text:"64,000 tokens"},
  {key:"C",text:"128,000 tokens"},
  {key:"D",text:"1,000,000 tokens"}
 ],
 answer:"C",
 explanation:"GPT-4o (2024-08-06) supports a 128,000-token input context window and up to 16,384 output tokens. The 1M token context is available with the newer GPT-4.1 model. The 32,768 limit was for older GPT-4-32k models.",
 cramRef:"../01-azure-openai.html"},

{id:"d2-002", type:"single", domain:"D2", topic:"API Parameters",
 question:"A Shelby County Schools developer is configuring their Azure OpenAI chat completion call to generate creative story prompts for students. They want more creative, varied responses. Which parameter configuration would BEST achieve this?",
 options:[
  {key:"A",text:"Set temperature to 0.2 and top_p to 0.1"},
  {key:"B",text:"Set temperature to 0.8 and leave top_p at the default of 1"},
  {key:"C",text:"Set both temperature to 0.8 and top_p to 0.2"},
  {key:"D",text:"Set frequency_penalty to -2.0 and presence_penalty to -2.0"}
 ],
 answer:"B",
 explanation:"Higher temperature values (like 0.8) produce more creative and varied outputs, while lower values (like 0.2) produce more deterministic results. Microsoft recommends adjusting either temperature OR top_p, but not both simultaneously. The default for both is 1. Setting negative penalties would encourage repetition, the opposite of creative output.",
 cramRef:"../01-azure-openai.html"},

{id:"d2-003", type:"single", domain:"D2", topic:"Deployment Types",
 question:"FedEx logistics needs to deploy GPT-4o for their global package routing AI with the highest possible throughput and automatic traffic routing across regions. Which deployment type should they choose?",
 options:[
  {key:"A",text:"Standard deployment in a single region"},
  {key:"B",text:"Global Standard deployment"},
  {key:"C",text:"Data Zone Standard deployment"},
  {key:"D",text:"Global Batch deployment"}
 ],
 answer:"B",
 explanation:"Global Standard deployments leverage Azure's global infrastructure to dynamically route traffic to the data center with the best availability. This provides the highest default quota and eliminates the need to load balance across multiple resources. Standard deployment is region-specific. Data Zone Standard is limited to a specific geographic zone (US or EU). Global Batch is for asynchronous processing with 24-hour turnaround, not real-time routing.",
 cramRef:"../01-azure-openai.html"},

{id:"d2-004", type:"single", domain:"D2", topic:"DALL-E 3 Image Generation",
 question:"The Beale Street Entertainment District is using DALL-E 3 to generate promotional images. A developer wants to generate multiple images in a single API call. What is the limitation?",
 options:[
  {key:"A",text:"DALL-E 3 supports up to 5 images per API call"},
  {key:"B",text:"DALL-E 3 supports up to 10 images per API call"},
  {key:"C",text:"DALL-E 3 only supports n=1; you must make parallel requests for multiple images"},
  {key:"D",text:"DALL-E 3 supports up to 3 images per API call"}
 ],
 answer:"C",
 explanation:"With DALL-E 3, the n parameter must be set to 1 -- you cannot generate more than one image in a single API call. To generate multiple images, you must make parallel requests. This is a limitation specific to DALL-E 3; the newer GPT-image-1 model supports generating between 1 and 10 images per call.",
 cramRef:"../01-azure-openai.html"},

{id:"d2-005", type:"single", domain:"D2", topic:"Fine-Tuning Requirements",
 question:"St. Jude Children's Research Hospital wants to fine-tune a model for medical report summarization. Their training dataset contains 8 examples in JSONL format. What will happen when they submit the fine-tuning job?",
 options:[
  {key:"A",text:"The job will complete but produce poor results due to insufficient data"},
  {key:"B",text:"The job will not proceed because a minimum of 10 training examples is required"},
  {key:"C",text:"The job will succeed because any number of examples is accepted"},
  {key:"D",text:"The job will fail because medical data requires special approval"}
 ],
 answer:"B",
 explanation:"Azure OpenAI fine-tuning jobs require a minimum of 10 training examples. The job will not proceed without meeting this minimum. Microsoft recommends starting with at least 50 high-quality examples for noticeable results, and hundreds or thousands for best outcomes. The minimum is a technical requirement, not a quality recommendation.",
 cramRef:"../01-azure-openai.html"},

{id:"d2-006", type:"single", domain:"D2", topic:"RAG Pattern",
 question:"The Memphis Grizzlies fan engagement platform uses RAG to answer questions about team history from a knowledge base. Which component is responsible for finding relevant content chunks from the knowledge base before sending them to the LLM?",
 options:[
  {key:"A",text:"Azure OpenAI embeddings model"},
  {key:"B",text:"Azure AI Search index with hybrid search"},
  {key:"C",text:"The LLM's internal knowledge base"},
  {key:"D",text:"Azure Blob Storage with full-text search"}
 ],
 answer:"B",
 explanation:"In a RAG architecture, Azure AI Search serves as the retrieval engine that finds relevant content chunks from indexed data using hybrid search (combining keyword and vector similarity search). The embeddings model converts text to vectors during indexing, but the actual retrieval is performed by AI Search. The LLM then uses the retrieved content as grounding data to generate responses.",
 cramRef:"../06-foundry-agents.html"},

// ── MULTI-SELECT (3) ───────────────────────────────────────────────
{id:"d2-007", type:"multi", domain:"D2", topic:"Chat Completions API Parameters", selectCount:2,
 question:"A FedEx developer is reviewing the Azure OpenAI Chat Completions API documentation. Which TWO parameters have a valid range of -2.0 to 2.0? (Select 2)",
 options:[
  {key:"A",text:"temperature"},
  {key:"B",text:"presence_penalty"},
  {key:"C",text:"frequency_penalty"},
  {key:"D",text:"top_p"}
 ],
 answer:["B","C"],
 explanation:"Both presence_penalty and frequency_penalty have a range of -2.0 to 2.0. Positive values penalize repetition (presence_penalty for any repetition, frequency_penalty based on how often tokens appear). Temperature ranges from 0 to 2. Top_p ranges from 0 to 1. Both temperature and top_p default to 1.",
 cramRef:"../01-azure-openai.html"},

{id:"d2-008", type:"multi", domain:"D2", topic:"DALL-E 3 vs GPT-image-1", selectCount:2,
 question:"The Memphis Zoo marketing team is comparing DALL-E 3 and GPT-image-1 for generating promotional materials. Which TWO features are available in GPT-image-1 but NOT in DALL-E 3? (Select 2)",
 options:[
  {key:"A",text:"Image editing and inpainting with mask support"},
  {key:"B",text:"Natural and vivid style options"},
  {key:"C",text:"Generating up to 10 images per API call"},
  {key:"D",text:"1792x1024 landscape image size"}
 ],
 answer:["A","C"],
 explanation:"GPT-image-1 supports image editing/inpainting with mask parameters and can generate 1-10 images per API call. DALL-E 3 does not support image editing and is limited to n=1. Style options (natural/vivid) are specific to DALL-E 3, not GPT-image-1. The 1792x1024 size is a DALL-E 3 option; GPT-image-1 uses 1536x1024 instead.",
 cramRef:"../01-azure-openai.html"},

{id:"d2-009", type:"multi", domain:"D2", topic:"Fine-Tuning Data Format", selectCount:3,
 question:"Shelby County Schools is preparing training data for fine-tuning GPT-4o-mini. Which THREE requirements must their training file meet? (Select 3)",
 options:[
  {key:"A",text:"File must be in JSON Lines (JSONL) format"},
  {key:"B",text:"File must use the Chat Completions conversational format with messages array"},
  {key:"C",text:"File must be encoded in UTF-8 with a byte-order mark (BOM)"},
  {key:"D",text:"File must contain at least 100 training examples"},
  {key:"E",text:"File must be no larger than 1 GB"}
 ],

 cramRef:"../01-azure-openai.html"},

{id:"d2-010", type:"order", domain:"D2", topic:"Fine-Tuning Workflow",
 question:"Place the Azure OpenAI fine-tuning steps in the correct order:",
 options:[
  {key:"A",text:"Deploy the fine-tuned model for inference"},
  {key:"B",text:"Upload training and validation JSONL files"},
  {key:"C",text:"Create a fine-tuning job specifying the base model and training file"},
  {key:"D",text:"Select and prepare a base model (e.g., gpt-4o-mini-2024-07-18)"}
 ],
 answer:["D","B","C","A"],
 explanation:"The fine-tuning workflow is: (1) Select a base model, (2) Upload training/validation data as JSONL files, (3) Create the fine-tuning job specifying the base model and uploaded files, (4) Once training completes, deploy the fine-tuned model. You can optionally analyze performance after deployment.",

{id:"d2-011", type:"order", domain:"D2", topic:"RAG Implementation",
 question:"Place the steps for implementing a RAG solution with Azure AI Search and Azure OpenAI in the correct order:",
 options:[
  {key:"A",text:"Send the user query plus retrieved chunks to the LLM for answer generation"},
  {key:"B",text:"Chunk and index your documents in Azure AI Search with embeddings"},
  {key:"C",text:"Retrieve relevant document chunks using hybrid search"},
  {key:"D",text:"Receive the user's natural language question"}
 ],
 answer:["B","D","C","A"],
 explanation:"RAG implementation follows: (1) Prepare content by chunking documents and creating an index with embeddings (this happens at setup time), (2) Receive the user query at runtime, (3) Retrieve relevant chunks from the index using hybrid search (keyword + vector), (4) Send the query plus retrieved grounding data to the LLM to generate a cited response.",
 cramRef:"../06-foundry-agents.html"},

{id:"d2-012", type:"scenario", domain:"D2", topic:"Temperature and Determinism",
 scenario:"Shelby Farms Park has deployed an Azure OpenAI chatbot that provides safety information to park visitors. The chatbot uses GPT-4o and must give consistent, factual responses about wildlife encounters, trail closures, and emergency procedures. During testing, the team notices that the same question about 'what to do if you encounter a coyote' produces different answers each time, some of which include inaccurate advice.",
 question:"What should the team do to ensure consistent, accurate responses?",
 options:[
  {key:"A",text:"Set temperature to 0 or near 0 for more deterministic output"},
  {key:"B",text:"Set top_p to 1.0 to consider all possible tokens"},
  {key:"C",text:"Increase the max_tokens parameter to allow longer responses"},
  {key:"D",text:"Set frequency_penalty to 2.0 to prevent repetitive answers"}
 ],
 answer:"A",
 explanation:"For factual, safety-critical information that must be consistent, setting temperature to 0 or near 0 produces the most deterministic and focused responses. Top_p at 1.0 is the default and allows maximum randomness. Max_tokens controls length, not consistency. High frequency_penalty prevents repetition but doesn't improve factual accuracy or consistency.",
 cramRef:"../01-azure-openai.html"},

{id:"d2-013", type:"scenario", domain:"D2", topic:"Deployment Type Selection",
 scenario:"A European Union-based healthcare organization is using Azure OpenAI for processing patient records in German and French. They have strict data residency requirements: all data processing must occur within EU member nations. They need higher throughput than standard regional deployments can provide but cannot use global deployment due to data sovereignty concerns.",
 question:"Which deployment type should they use?",
 options:[
  {key:"A",text:"Global Standard deployment with a resource in Sweden Central"},
  {key:"B",text:"Data Zone Standard deployment with a resource in an EU region"},
  {key:"C",text:"Standard deployment in France Central only"},

 cramRef:"../01-azure-openai.html"},

{id:"d2-014", type:"scenario", domain:"D2", topic:"Prompt Engineering",
 scenario:"Memphis 311 is building an AI assistant that classifies citizen complaints into categories: Roads, Utilities, Parks, Noise, and Other. During testing with zero-shot prompting (just asking 'Classify this complaint'), the model frequently miscategorizes complaints. For example, 'The streetlight on Poplar Avenue has been out for a week' is classified as 'Roads' instead of 'Utilities.'",
 question:"Which prompt engineering technique would MOST improve classification accuracy?",
 options:[
  {key:"A",text:"Add a chain-of-thought instruction asking the model to reason step-by-step"},
  {key:"B",text:"Use few-shot learning by providing example complaints with correct categories in the prompt"},
  {key:"C",text:"Increase the temperature to 1.5 to explore more classification options"},
  {key:"D",text:"Add a stop sequence after the category name to prevent extra output"}
 ],
 answer:"B",
 explanation:"Few-shot learning provides example input-output pairs that demonstrate the correct classification behavior. By showing the model that streetlight issues map to 'Utilities' (not 'Roads'), the model learns the expected categorization pattern. Chain-of-thought is more useful for complex reasoning tasks. Higher temperature increases randomness, which hurts classification accuracy. Stop sequences control output format, not accuracy.",
 cramRef:"../01-azure-openai.html"},

{id:"d2-015", type:"match", domain:"D2", topic:"Deployment Types",

{id:"d2-016", type:"match", domain:"D2", topic:"Prompt Engineering Techniques",
 question:"Match each prompt engineering technique to its description:",
 pairs:[

  {left:"Few-shot",right:"Multiple input-output examples are included in the prompt to demonstrate the pattern"},

 question:"Answer the following questions about the platform design:",
 subQuestions:[
  {id:"d2-020a", type:"single",
   question:"What temperature settings should be used for the homework help chatbot (Component 1) and the creative writing assistant (Component 2)?",

   ],

{id:"d4-017", type:"single", domain:"D4", topic:"REST API: Async Polling",
 question:"After submitting a document to the Document Intelligence analyze API, a developer receives an HTTP 202 response. How should they retrieve the analysis results?",
 options:[
  {key:"A",text:"Parse the results directly from the 202 response body"},
  {key:"B",text:"Send a GET request to the URL in the Operation-Location response header and poll until status is 'succeeded'"},
  {key:"C",text:"Send a GET request to the same URL used for the POST, appending /results to the path"},
  {key:"D",text:"Configure a webhook callback URL in the original request to receive results asynchronously"}
 ],

 cramRef:"../02-computer-vision.html"},

const DOMAIN_BADGES = {D1:'badge-amber',D2:'badge-blue',D3:'badge-purple',D4:'badge-green',D5:'badge-cyan',D6:'badge-red'};
const DOMAIN_COLORS = {D1:'var(--amber)',D2:'var(--blue)',D3:'var(--purple)',D4:'var(--green)',D5:'var(--cyan)',D6:'var(--red)'};
const DOMAIN_NAMES = {D1:'Plan & Manage',D2:'Generative AI',D3:'Agentic Solutions',D4:'Computer Vision',D5:'NLP & Speech',D6:'Knowledge Mining'};

function buildExam() {
  const dist = {D1:12, D2:10, D3:4, D4:6, D5:9, D6:9};
  let exam = [];
  Object.entries(dist).forEach(([domain, count]) => {
    const pool = ALL_QUESTIONS.filter(q => q.domain === domain);
    const sampled = shuffle(pool).slice(0, count);
    exam = exam.concat(sampled);
  });
  return shuffle(exam);
}

// ========== QUIZ ENGINE ==========
const state = {
  questions: [],
  answers: {},
  checked: {},
  score: 0,
  total: 0,
  timerSec: 100 * 60,
  timerRef: null,
  finished: false
};

function init() {
  state.questions = buildExam();
  state.answers = {};
  state.checked = {};
  state.score = 0;
  state.total = 0;
  state.finished = false;
  state.timerSec = 100 * 60;
  renderQuestions();
  startTimer();
  updateProgress();
}

function newExam() {
  if (state.timerRef) clearInterval(state.timerRef);
  document.getElementById('summary').style.display = 'none';
  document.getElementById('summary').innerHTML = '';
  init();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startTimer() {
  const el = document.getElementById('timer');
  if (state.timerRef) clearInterval(state.timerRef);
  state.timerRef = setInterval(() => {
    if (state.timerSec <= 0) { clearInterval(state.timerRef); finishExam(); return; }
    state.timerSec--;
    const m = Math.floor(state.timerSec / 60);
    const s = state.timerSec % 60;
    el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (state.timerSec < 300) el.classList.add('warning');
    else el.classList.remove('warning');
  }, 1000);
}

function renderQuestions() {
  const container = document.getElementById('questions');
  container.innerHTML = state.questions.map((q, i) => renderQuestion(q, i)).join('');
}

function renderQuestion(q, idx) {
  let body = '';
  if (q.type !== 'casestudy' && q.scenario) body += `<div class="scenario-box">${q.scenario}</div>`;
  if (q.code) body += `<pre><code>${q.code}</code></pre>`;

  let instruction = '';
  if (q.type === 'multi') instruction = `<div class="q-instruction">Select ${q.selectCount || 2} answers</div>`;
  if (q.type === 'order') instruction = `<div class="q-instruction">Select the correct order (1 = first)</div>`;
  if (q.type === 'match') instruction = `<div class="q-instruction">Match each item on the left to its corresponding item on the right</div>`;
  if (q.type === 'code-fill') instruction = `<div class="q-instruction">Select the correct value for each blank in the code</div>`;
  if (q.type === 'hotarea') instruction = `<div class="q-instruction">Click the line(s) that contain errors</div>`;
  if (q.type === 'casestudy') instruction = `<div class="q-instruction">Read the scenario and answer all parts below</div>`;

  let optionsHtml = '';
  if (q.type === 'order') {
    optionsHtml = '<div class="order-items">' + q.options.map((o, oi) => {
      const selOpts = `<option value="">-</option>` + q.options.map((_, si) => `<option value="${si+1}">${si+1}</option>`).join('');
      return `<div class="order-item" id="order-${q.id}-${o.key}"><select class="order-select" onchange="handleOrder('${q.id}','${o.key}',this.value)">${selOpts}</select><span class="order-text"><strong>${o.key}.</strong> ${o.text}</span></div>`;
    }).join('') + '</div>';
  } else if (q.type === 'match') {
    optionsHtml = renderMatch(q);
  } else if (q.type === 'code-fill') {
    optionsHtml = renderCodeFill(q);
  } else if (q.type === 'hotarea') {
    optionsHtml = renderHotarea(q);
  } else if (q.type === 'casestudy') {
    optionsHtml = renderCaseStudy(q);
  } else {
    optionsHtml = '<div class="options">' + q.options.map(o =>
      `<div class="option-row" id="opt-${q.id}-${o.key}" tabindex="0" role="button" onclick="handleSelect('${q.id}','${o.key}','${q.type}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();handleSelect('${q.id}','${o.key}','${q.type}');}"><span class="option-key">${o.key}.</span><span class="option-text">${o.text}</span><span class="option-indicator" id="ind-${q.id}-${o.key}"></span></div>`
    ).join('') + '</div>';
  }

  return `<div class="question-card" id="qcard-${q.id}">
    <div class="q-header"><div class="q-meta"><span class="badge ${DOMAIN_BADGES[q.domain]||"badge-amber"}">${q.topic}</span></div><span class="q-num">Q${idx+1} of ${state.questions.length}</span></div>
    <div class="q-text">${q.question}</div>
    ${body}${instruction}${optionsHtml}
    <button class="btn btn-primary btn-sm" id="checkbtn-${q.id}" onclick="checkAnswer('${q.id}')">Check Answer</button>
    <div class="feedback" id="fb-${q.id}"></div>
  </div>`;
}

// ========== RENDER FUNCTIONS FOR NEW TYPES ==========

function renderMatch(q) {
  const shuffled = q.pairs.map((p, i) => ({...p, origIdx: i}));
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  if (!window._matchShuffles) window._matchShuffles = {};
  window._matchShuffles[q.id] = shuffled;

  const leftHtml = q.pairs.map((p, i) =>
    `<div class="match-item" id="match-l-${q.id}-${i}"><span class="match-num">${i+1}.</span> ${p.left}</div>`
  ).join('');

  const selOpts = `<option value="">-</option>` + q.pairs.map((_, i) =>
    `<option value="${i}">${i+1}</option>`
  ).join('');

  const rightHtml = shuffled.map((p, i) =>
    `<div class="match-item" id="match-r-${q.id}-${i}"><select class="match-select" onchange="handleMatch('${q.id}',${i},this.value)">${selOpts}</select> ${p.right}</div>`
  ).join('');

  return `<div class="match-container"><div class="match-col"><div class="match-col-header">Term</div>${leftHtml}</div><div class="match-col"><div class="match-col-header">Definition</div>${rightHtml}</div></div>`;
}

function renderCodeFill(q) {
  let html = q.codeTemplate;
  q.blanks.forEach(b => {
    const opts = `<option value="">---</option>` + b.options.map(o =>
      `<option value="${o}">${o}</option>`
    ).join('');
    html = html.replace(`[${b.id}]`, `<select class="code-fill-select" id="cf-${q.id}-${b.id}" onchange="handleCodeFill('${q.id}','${b.id}',this.value)">${opts}</select>`);
  });
  return `<pre class="code-fill-pre"><code>${html}</code></pre>`;
}

function renderHotarea(q) {
  const lines = q.codeLines.map(l =>
    `<div class="hotarea-line" id="ha-${q.id}-${l.id}" tabindex="0" role="button" onclick="handleHotarea('${q.id}',${l.id})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();handleHotarea('${q.id}',${l.id});}"><span class="hotarea-linenum">${l.id}</span><span class="hotarea-code">${l.text}</span></div>`
  ).join('');
  return `<div class="hotarea-lines">${lines}</div>`;
}

function renderCaseStudy(q) {
  let html = `<div class="casestudy-scenario">${q.scenario}</div>`;
  q.subQuestions.forEach((sq, si) => {
    const sqInstruction = sq.type === 'multi' ? `<div class="q-instruction">Select ${sq.selectCount || 2} answers</div>` : '';
    const sqOptions = sq.options.map(o =>
      `<div class="option-row" id="opt-${sq.id}-${o.key}" tabindex="0" role="button" onclick="handleSelect('${sq.id}','${o.key}','${sq.type}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();handleSelect('${sq.id}','${o.key}','${sq.type}');}"><span class="option-key">${o.key}.</span><span class="option-text">${o.text}</span><span class="option-indicator" id="ind-${sq.id}-${o.key}"></span></div>`
    ).join('');
    html += `<div class="casestudy-subq"><div class="casestudy-subq-label">Part ${String.fromCharCode(65+si)}</div><div class="q-text">${sq.question}</div>${sqInstruction}<div class="options">${sqOptions}</div><div class="feedback" id="fb-${sq.id}"></div></div>`;
  });
  return html;
}

// ========== HANDLER FUNCTIONS ==========

function handleSelect(qId, key, type) {
  if (state.checked[qId]) return;
  if (type === 'multi') {
    if (!state.answers[qId]) state.answers[qId] = [];
    const idx = state.answers[qId].indexOf(key);
    if (idx > -1) state.answers[qId].splice(idx, 1);
    else state.answers[qId].push(key);
  } else {
    state.answers[qId] = key;
  }
  // Update UI
  const q = state.questions.find(x => x.id === qId);
  // For casestudy sub-questions, find the sub-question's options
  let opts;
  if (q && q.options) {
    opts = q.options;
  } else {
    // Search sub-questions across all casestudy questions
    for (const cq of state.questions) {
      if (cq.type === 'casestudy' && cq.subQuestions) {
        const sq = cq.subQuestions.find(s => s.id === qId);
        if (sq) { opts = sq.options; break; }
      }
    }
  }
  if (opts) {
    opts.forEach(o => {
      const el = document.getElementById(`opt-${qId}-${o.key}`);
      if (!el) return;
      el.classList.remove('selected');
      if (type === 'multi') {
        if (state.answers[qId] && state.answers[qId].includes(o.key)) el.classList.add('selected');
      } else {
        if (state.answers[qId] === o.key) el.classList.add('selected');
      }
    });
  }
  // Mark card as answered
  if (q) {
    document.getElementById('qcard-' + qId).classList.add('has-answer');
  } else {
    // This is a casestudy sub-question; mark the parent card
    for (const cq of state.questions) {
      if (cq.type === 'casestudy' && cq.subQuestions) {
        const sq = cq.subQuestions.find(s => s.id === qId);
        if (sq) { document.getElementById('qcard-' + cq.id).classList.add('has-answer'); break; }
      }
    }
  }
  updateProgress();
}

function handleOrder(qId, key, val) {
  if (state.checked[qId]) return;
  if (!state.answers[qId]) state.answers[qId] = {};
  state.answers[qId][key] = parseInt(val);
  document.getElementById('qcard-' + qId).classList.add('has-answer');
  updateProgress();
}

function handleMatch(qId, rightIdx, leftIdx) {
  if (state.checked[qId]) return;
  if (!state.answers[qId]) state.answers[qId] = {};
  state.answers[qId][rightIdx] = leftIdx === '' ? null : parseInt(leftIdx);
  document.getElementById('qcard-' + qId).classList.add('has-answer');
  updateProgress();
}

function handleCodeFill(qId, blankId, value) {
  if (state.checked[qId]) return;
  if (!state.answers[qId]) state.answers[qId] = {};
  state.answers[qId][blankId] = value;
  document.getElementById('qcard-' + qId).classList.add('has-answer');
  updateProgress();
}

function handleHotarea(qId, lineId) {
  if (state.checked[qId]) return;
  if (!state.answers[qId]) state.answers[qId] = [];
  const idx = state.answers[qId].indexOf(lineId);
  if (idx > -1) state.answers[qId].splice(idx, 1);
  else state.answers[qId].push(lineId);
  const el = document.getElementById(`ha-${qId}-${lineId}`);
  el.classList.toggle('selected');
  document.getElementById('qcard-' + qId).classList.add('has-answer');
  updateProgress();
}

// ========== GRADING ==========

function checkAnswer(qId) {
  if (state.checked[qId]) return;
  const q = state.questions.find(x => x.id === qId);

  // Check if question has been answered
  let hasAnswer;
  if (q.type === 'casestudy') {
    hasAnswer = q.subQuestions && q.subQuestions.some(sq => state.answers[sq.id] !== undefined);
  } else if (q.type === 'match' || q.type === 'order' || q.type === 'code-fill') {
    hasAnswer = state.answers[qId] && Object.keys(state.answers[qId]).length > 0;
  } else if (q.type === 'multi') {
    hasAnswer = state.answers[qId] && state.answers[qId].length > 0;
  } else if (q.type === 'hotarea') {
    hasAnswer = state.answers[qId] && state.answers[qId].length > 0;
  } else {
    hasAnswer = state.answers[qId] !== undefined;
  }
  if (!hasAnswer) {
    const card = document.getElementById(`qcard-${qId}`);
    card.style.borderColor = 'var(--amber)';
    card.style.transition = 'border-color 0.3s';
    setTimeout(() => { card.style.borderColor = ''; }, 1000);
    return;
  }

  state.checked[qId] = true;
  state.total++;

  let correct = false;

  if (q.type === 'order') {
    const ans = state.answers[qId] || {};
    correct = true;
    q.options.forEach(o => {
      const userPos = ans[o.key];
      const correctPos = q.answer.indexOf(o.key) + 1;
      const el = document.getElementById(`order-${qId}-${o.key}`);
      if (userPos === correctPos) {
        el.classList.add('correct-pos');
      } else {
        el.classList.add('wrong-pos');
        correct = false;
      }
      el.querySelector('select').disabled = true;
    });

  } else if (q.type === 'match') {
    const ans = state.answers[qId] || {};
    const shuffled = window._matchShuffles[qId];
    correct = true;
    shuffled.forEach((p, ri) => {
      const userLeft = ans[ri];
      const correctLeft = p.origIdx;
      const el = document.getElementById(`match-r-${qId}-${ri}`);
      if (userLeft === correctLeft) {
        el.classList.add('correct-match');
      } else {
        el.classList.add('wrong-match');
        correct = false;
      }
      el.querySelector('select').disabled = true;
    });
    shuffled.forEach((p, ri) => {
      const userLeft = ans[ri];
      const correctLeft = p.origIdx;
      if (userLeft === correctLeft) {
        document.getElementById(`match-l-${qId}-${correctLeft}`).classList.add('correct-match');
      }
    });

  } else if (q.type === 'code-fill') {
    const ans = state.answers[qId] || {};
    correct = true;
    q.blanks.forEach(b => {
      const sel = document.getElementById(`cf-${qId}-${b.id}`);
      if (ans[b.id] === b.answer) {
        sel.classList.add('correct-blank');
      } else {
        sel.classList.add('wrong-blank');
        correct = false;
      }
      sel.disabled = true;
    });

  } else if (q.type === 'hotarea') {
    const userLines = (state.answers[qId] || []).sort();
    const correctLines = [...q.answer].sort();
    correct = userLines.length === correctLines.length && userLines.every((v, i) => v === correctLines[i]);
    q.codeLines.forEach(l => {
      const el = document.getElementById(`ha-${qId}-${l.id}`);
      el.style.cursor = 'default';
      const isCorrect = q.answer.includes(l.id);
      const isSelected = (state.answers[qId] || []).includes(l.id);
      if (isCorrect && isSelected) el.classList.add('correct-line');
      else if (isCorrect && !isSelected) el.classList.add('missed-line');
      else if (!isCorrect && isSelected) el.classList.add('wrong-line');
      el.classList.remove('selected');
      el.onclick = null;
    });

  } else if (q.type === 'casestudy') {
    correct = true;
    q.subQuestions.forEach(sq => {
      let sqCorrect = false;
      if (sq.type === 'multi') {
        const userAns = (state.answers[sq.id] || []).sort();
        const correctAns = [...sq.answer].sort();
        sqCorrect = userAns.length === correctAns.length && userAns.every((v, i) => v === correctAns[i]);
      } else {
        sqCorrect = state.answers[sq.id] === sq.answer;
      }
      if (!sqCorrect) correct = false;
      // Highlight sub-question options
      sq.options.forEach(o => {
        const el = document.getElementById(`opt-${sq.id}-${o.key}`);
        if (el) {
          el.classList.add('disabled');
          const isCorrectKey = Array.isArray(sq.answer) ? sq.answer.includes(o.key) : sq.answer === o.key;
          const isSelected = Array.isArray(state.answers[sq.id]) ? (state.answers[sq.id] || []).includes(o.key) : state.answers[sq.id] === o.key;
          if (isCorrectKey) { el.classList.add('correct-answer'); const ind = document.getElementById(`ind-${sq.id}-${o.key}`); if(ind) ind.textContent = '\u2713'; }
          else if (isSelected) { el.classList.add('wrong-answer'); const ind = document.getElementById(`ind-${sq.id}-${o.key}`); if(ind) ind.textContent = '\u2717'; }
        }
      });
      // Show sub-question feedback
      const fb = document.getElementById(`fb-${sq.id}`);
      if (fb) {
        fb.className = `feedback show ${sqCorrect ? 'correct' : 'incorrect'}`;
        fb.innerHTML = `<strong>${sqCorrect ? '\u2713 Correct' : '\u2717 Incorrect'}</strong>${sq.explanation}`;
      }
    });

  } else {
    // single, multi, scenario
    if (q.type === 'multi') {
      const userAns = (state.answers[qId] || []).sort();
      const correctAns = [...q.answer].sort();
      correct = userAns.length === correctAns.length && userAns.every((v, i) => v === correctAns[i]);
    } else {
      correct = state.answers[qId] === q.answer;
    }
    // Highlight options
    q.options.forEach(o => {
      const el = document.getElementById(`opt-${qId}-${o.key}`);
      el.classList.add('disabled');
      const isCorrectKey = Array.isArray(q.answer) ? q.answer.includes(o.key) : q.answer === o.key;
      const isSelected = Array.isArray(state.answers[qId]) ? state.answers[qId].includes(o.key) : state.answers[qId] === o.key;
      if (isCorrectKey) {
        el.classList.add('correct-answer');
        document.getElementById(`ind-${qId}-${o.key}`).textContent = '\u2713';
      } else if (isSelected && !isCorrectKey) {
        el.classList.add('wrong-answer');
        document.getElementById(`ind-${qId}-${o.key}`).textContent = '\u2717';
      }
    });
  }

  if (correct) state.score++;
  const card = document.getElementById(`qcard-${qId}`);
  card.classList.add(correct ? 'correct' : 'incorrect');
  document.getElementById(`checkbtn-${qId}`).disabled = true;

  const fb = document.getElementById(`fb-${qId}`);
  fb.className = `feedback show ${correct ? 'correct' : 'incorrect'}`;
  fb.innerHTML = `<strong>${correct ? '\u2713 Correct!' : '\u2717 Incorrect'}</strong>${q.explanation}${q.cramRef ? `<div class="cram-link"><a href="${q.cramRef}" target="_blank">Study this topic \u2192</a></div>` : ''}`;

  updateProgress();
}

function gradeAll() {
  if (!confirm('Grade all unanswered questions? Unanswered questions will be marked incorrect.')) return;
  // Force-grade unanswered by temporarily setting empty answers
  state.questions.forEach(q => {
    if (!state.checked[q.id]) {
      // Ensure answer exists so checkAnswer doesn't bounce
      if (state.answers[q.id] === undefined) {
        if (q.type === 'multi' || q.type === 'hotarea') state.answers[q.id] = [];
        else if (q.type === 'order' || q.type === 'match' || q.type === 'code-fill') state.answers[q.id] = {};
        else if (q.type === 'casestudy') {
          q.subQuestions.forEach(sq => { if (state.answers[sq.id] === undefined) state.answers[sq.id] = sq.type === 'multi' ? [] : ''; });
        }
        else state.answers[q.id] = '';
      }
      checkAnswer(q.id);
    }
  });
}

function finishExam() {
  if (state.finished) return;
  state.finished = true;
  clearInterval(state.timerRef);
  showAllAnswers();

  const pct = state.questions.length > 0 ? Math.round((state.score / state.questions.length) * 100) : 0;
  const pass = pct >= 70;

  // Per-domain breakdown
  const domains = {};
  state.questions.forEach(q => {
    const d = q.domain;
    if (!domains[d]) domains[d] = { correct: 0, total: 0 };
    domains[d].total++;
    const isCorrect = state.checked[q.id] && document.getElementById(`qcard-${q.id}`).classList.contains('correct');
    if (isCorrect) domains[d].correct++;
  });

  let breakdownHtml = Object.entries(domains).sort(([a],[b]) => a.localeCompare(b)).map(([domain, data]) => {
    const tPct = Math.round((data.correct / data.total) * 100);
    const color = tPct >= 70 ? DOMAIN_COLORS[domain] || 'var(--green)' : 'var(--red)';
    const name = DOMAIN_NAMES[domain] || domain;
    return `<div class="breakdown-row"><span style="color:${DOMAIN_COLORS[domain] || 'var(--text)'}">${name}</span><div class="breakdown-bar"><div class="breakdown-bar-fill" style="width:${tPct}%;background:${DOMAIN_COLORS[domain] || color};"></div></div><span>${data.correct}/${data.total} (${tPct}%)</span></div>`;
  }).join('');

  let reviewHtml = state.questions.map((q, i) => {
    const isCorrect = document.getElementById(`qcard-${q.id}`).classList.contains('correct');
    const dotClass = isCorrect ? 'correct' : 'incorrect';
    return `<div class="review-item" onclick="document.getElementById('qcard-${q.id}').scrollIntoView({behavior:'smooth'})"><div class="review-dot ${dotClass}"></div>Q${i+1}: ${q.domain} &mdash; ${q.topic}</div>`;
  }).join('');

  const summary = document.getElementById('summary');
  summary.style.display = 'block';
  summary.innerHTML = `<div class="summary-card">
    <div class="score-big ${pass ? 'pass' : 'fail'}">${pct}%</div>
    <div class="score-label">${state.score} of ${state.questions.length} correct</div>
    <div class="pass-fail ${pass ? 'pass' : 'fail'}">${pass ? 'PASS' : 'NEEDS MORE STUDY'}</div>
    <div class="breakdown"><h3>Domain Breakdown</h3>${breakdownHtml}</div>
    <div class="review-list"><h3 style="color:var(--accent);font-size:0.95rem;margin:1rem 0 0.5rem;">Question Review</h3>${reviewHtml}</div>
    <div class="btn-group" style="justify-content:center;margin-top:1.5rem;">
      <button class="btn btn-primary" onclick="newExam()">New Exam</button>
      <button class="btn btn-secondary" onclick="window.scrollTo({top:0,behavior:'smooth'})">Review Answers</button>
      <a href="../index.html" class="btn btn-secondary" style="text-decoration:none;">Study Cram Sheets</a>
    </div>
  </div>`;
  summary.scrollIntoView({ behavior: 'smooth' });
}

function updateProgress() {
  // Count answered questions (for casestudy, count the parent question if any sub-question is answered)
  let answered = 0;
  state.questions.forEach(q => {
    if (q.type === 'casestudy') {
      const allAnswered = q.subQuestions && q.subQuestions.every(sq => state.answers[sq.id] !== undefined);
      if (allAnswered) answered++;
    } else if (state.answers[q.id] !== undefined) {
      answered++;
    }
  });
  const total = state.questions.length;
  document.getElementById('progressFill').style.width = `${(answered/total)*100}%`;
  document.getElementById('progressText').textContent = `${answered} of ${total} answered`;
  document.getElementById('scoreDisplay').textContent = `Score: ${state.score}/${state.total}`;
}

init();
</script>
